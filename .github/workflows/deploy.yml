name: Deploy Backend to VPS (PM2 + Bun)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /root/yash/AdVerifySDK/server
            git -C /root/yash/AdVerifySDK pull origin main
            bun install
            bunx prisma generate
            bunx prisma migrate deploy
            pm2 restart adverify --update-env
            pm2 save